<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ornata Live Filter Demo</title>
        <style>
            :root {
                color-scheme: light;
                font-family: "Avenir Next", "Segoe UI", sans-serif;
                background: #eff7f2;
                color: #193025;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background:
                    radial-gradient(circle at top, #fbfffc 0, #edf7f0 48%, #dcefe1 100%);
            }

            .demo-shell {
                width: min(100%, 460px);
                padding: 24px;
                border: 1px solid #c5dfce;
                border-radius: 22px;
                background: rgba(255, 255, 255, 0.96);
                box-shadow: 0 18px 40px rgba(29, 77, 49, 0.12);
            }

            h1 {
                margin: 0 0 8px;
                font-size: 1.25rem;
            }

            p {
                margin: 0 0 18px;
                line-height: 1.5;
            }

            [data-filter] {
                display: grid;
                gap: 16px;
            }

            label {
                display: grid;
                gap: 8px;
                font-weight: 700;
            }

            [data-filter-input] {
                width: 100%;
                padding: 0.85rem 0.95rem;
                border: 1px solid #b4d1bf;
                border-radius: 14px;
                font: inherit;
                background: #fbfffc;
            }

            [data-filter-list] {
                margin: 0;
                padding: 0;
                list-style: none;
                display: grid;
                gap: 10px;
            }

            [data-filter-item] {
                padding: 12px 14px;
                border-radius: 14px;
                border: 1px solid #d5e8db;
                background: #f6fbf7;
            }

            [data-filter-item][hidden] {
                display: none;
            }
        </style>
    </head>
    <body>
        <main class="demo-shell">
            <h1>Live Filter Demo</h1>
            <p>Type to filter existing list markup without replacing the list itself.</p>

            <section data-filter>
                <label>
                    Search
                    <input type="search" data-filter-input />
                </label>

                <ul data-filter-list>
                    <li data-filter-item>Alpha</li>
                    <li data-filter-item>Beta</li>
                    <li data-filter-item>Gamma</li>
                </ul>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/ornata@0.2.0/dist/index.global.js"></script>
        <script>
            const { defineComponent } = window.Ornata;

            const LiveFilter = defineComponent({
                name: "LiveFilter",
                state: {
                    query: { default: "" },
                },
                elements: {
                    input: {
                        resolve(root) {
                            return root.querySelector("[data-filter-input]");
                        },
                    },
                    items: { queryAll: "[data-filter-item]" },
                },
                render: {
                    input() {
                        return {
                            events: {
                                input: (event) => {
                                    const target = event.currentTarget;
                                    this.state.query = target.value;
                                },
                            },
                        };
                    },
                    items({ index }) {
                        const item = this.elements.items[index ?? 0];
                        const text = item?.textContent?.toLowerCase() || "";
                        const matches = text.includes(this.state.query.toLowerCase());

                        return {
                            attributes: {
                                hidden: !matches,
                            },
                        };
                    },
                },
            });

            LiveFilter.mount("[data-filter]");
        </script>
    </body>
</html>
