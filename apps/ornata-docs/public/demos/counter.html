<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ornata Counter Demo</title>
        <style>
            :root {
                color-scheme: light;
                font-family: "Avenir Next", "Segoe UI", sans-serif;
                background: #f6f1e8;
                color: #1f2933;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background:
                    radial-gradient(circle at top, #fff8ef 0, #f6f1e8 45%, #efe5d4 100%);
            }

            .demo-shell {
                width: min(100%, 420px);
                padding: 24px;
                border: 1px solid #d7c7ae;
                border-radius: 20px;
                background: rgba(255, 252, 246, 0.96);
                box-shadow: 0 18px 40px rgba(86, 60, 27, 0.12);
            }

            h1 {
                margin: 0 0 8px;
                font-size: 1.25rem;
            }

            p {
                margin: 0 0 16px;
                line-height: 1.5;
            }

            [data-counter] {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                padding: 18px;
                border-radius: 16px;
                background: #fff;
                border: 1px solid #eadfcd;
            }

            [data-count-button] {
                border: 0;
                border-radius: 999px;
                padding: 0.85rem 1rem;
                font: inherit;
                font-weight: 700;
                color: #fffaf2;
                background: linear-gradient(135deg, #bb5a2a, #8d3a18);
                cursor: pointer;
            }

            [data-count-value] {
                font-weight: 800;
                font-variant-numeric: tabular-nums;
            }
        </style>
    </head>
    <body>
        <main class="demo-shell">
            <h1>Counter Demo</h1>
            <p>Click the button to update server-rendered markup in place.</p>

            <section data-counter>
                <p>Total: <span data-count-value>0</span></p>
                <button type="button" data-count-button>Increment</button>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/ornata@0.2.0/dist/index.global.js"></script>
        <script>
            const { defineComponent } = window.Ornata;

            const Counter = defineComponent({
                name: "Counter",
                state: {
                    count: { default: 0 },
                },
                elements: {
                    value: { query: "[data-count-value]" },
                    button: { query: "[data-count-button]" },
                },
                methods: {
                    increment() {
                        this.state.count += 1;
                    },
                },
                render: {
                    value() {
                        return {
                            text: String(this.state.count),
                        };
                    },
                    button() {
                        return {
                            events: {
                                click: () => this.methods.increment(),
                            },
                        };
                    },
                },
            });

            Counter.mount("[data-counter]");
        </script>
    </body>
</html>
