<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ornata HTML State Demo</title>
        <style>
            :root {
                color-scheme: light;
                font-family: 'Avenir Next', 'Segoe UI', sans-serif;
                background: #f7f2ea;
                color: #241d15;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background: radial-gradient(
                    circle at top,
                    #fffcf7 0,
                    #f6efe3 48%,
                    #eadfce 100%
                );
            }

            .demo-shell {
                width: min(100%, 460px);
                padding: 24px;
                border: 1px solid #dcc8af;
                border-radius: 22px;
                background: rgba(255, 252, 247, 0.96);
                box-shadow: 0 18px 40px rgba(89, 62, 24, 0.12);
            }

            h1 {
                margin: 0 0 8px;
                font-size: 1.25rem;
            }

            p {
                margin: 0 0 18px;
                line-height: 1.5;
            }

            [data-counter] {
                display: grid;
                gap: 14px;
                padding: 18px;
                border-radius: 18px;
                border: 1px solid #eadcc7;
                background: #fff;
            }

            [data-count-button] {
                justify-self: start;
                border: 0;
                border-radius: 999px;
                padding: 0.8rem 1rem;
                font: inherit;
                font-weight: 700;
                color: #fffaf2;
                background: linear-gradient(135deg, #bb6a2b, #8d471a);
                cursor: pointer;
            }

            strong {
                font-variant-numeric: tabular-nums;
            }
        </style>
    </head>
    <body>
        <main class="demo-shell">
            <h1>HTML State Demo</h1>
            <p>
                The initial value comes from the server-rendered HTML, not the
                JavaScript definition. It is applied to the initial HTML
                attribute: <code>data-count="3"</code>
            </p>

            <section data-counter data-count="3" data-label="Server count">
                <p>
                    <span data-count-label>Server count:</span>
                    <strong data-count-value></strong>
                </p>
                <button type="button" data-count-button>Increment</button>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/ornata/dist/index.global.js"></script>
        <script>
            const { defineComponent } = window.Ornata;

            const Counter = defineComponent({
                name: 'Counter',
                state: {
                    count: { default: 0, type: Number },
                },
                elements: {
                    value: { query: '[data-count-value]' },
                    button: { query: '[data-count-button]' },
                },
                methods: {
                    increment() {
                        this.state.count += 1;
                    },
                },
                render: {
                    value() {
                        return {
                            text: String(this.state.count),
                        };
                    },
                    button() {
                        return {
                            events: {
                                click: () => this.methods.increment(),
                            },
                        };
                    },
                },
            });

            Counter.mount('[data-counter]');
        </script>
    </body>
</html>
