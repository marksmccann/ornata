<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ornata Persistent Data Demo</title>
        <style>
            :root {
                color-scheme: light;
                font-family: "Avenir Next", "Segoe UI", sans-serif;
                background: #eef7f8;
                color: #173033;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background:
                    radial-gradient(circle at top, #fbffff 0, #edf7f8 48%, #d8ecee 100%);
            }

            .demo-shell {
                width: min(100%, 460px);
                padding: 24px;
                border: 1px solid #c8e0e2;
                border-radius: 22px;
                background: rgba(255, 255, 255, 0.96);
                box-shadow: 0 18px 40px rgba(24, 84, 91, 0.12);
            }

            h1 {
                margin: 0 0 8px;
                font-size: 1.25rem;
            }

            p {
                margin: 0 0 18px;
                line-height: 1.5;
            }

            [data-clock] {
                display: grid;
                gap: 14px;
            }

            [data-clock-value] {
                padding: 18px;
                border-radius: 16px;
                border: 1px solid #d6ebed;
                background: #f8fcfc;
                font-size: 1.5rem;
                font-weight: 800;
                font-variant-numeric: tabular-nums;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <main class="demo-shell">
            <h1>Persistent Data Demo</h1>
            <p>This clock uses <code>data.intervalId</code> to keep the timer handle alive for the life of the instance.</p>

            <section data-clock>
                <div data-clock-value>Waiting…</div>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/ornata/dist/index.global.js"></script>
        <script>
            const { defineComponent } = window.Ornata;

            const Clock = defineComponent({
                name: "Clock",
                data: {
                    intervalId: null,
                },
                elements: {
                    value: { query: "[data-clock-value]" },
                },
                methods: {
                    updateTime() {
                        this.elements.value.textContent = new Date().toLocaleTimeString();
                    },
                },
                lifecycle: {
                    mount() {
                        this.methods.updateTime();
                        this.data.intervalId = window.setInterval(() => {
                            this.methods.updateTime();
                        }, 1000);
                    },
                    unmount() {
                        if (this.data.intervalId !== null) {
                            window.clearInterval(this.data.intervalId);
                        }
                    },
                },
            });

            Clock.mount("[data-clock]");
        </script>
    </body>
</html>
