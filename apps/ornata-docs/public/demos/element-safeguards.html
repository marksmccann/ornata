<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ornata Element Safeguards Demo</title>
        <style>
            :root {
                color-scheme: light;
                font-family: "Avenir Next", "Segoe UI", sans-serif;
                background: #f4f6fb;
                color: #1b2333;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background:
                    radial-gradient(circle at top, #ffffff 0, #eef2fb 48%, #e0e7f8 100%);
            }

            .demo-shell {
                width: min(100%, 520px);
                padding: 24px;
                border: 1px solid #d0daef;
                border-radius: 22px;
                background: rgba(255, 255, 255, 0.96);
                box-shadow: 0 18px 40px rgba(36, 57, 102, 0.12);
            }

            h1 {
                margin: 0 0 8px;
                font-size: 1.25rem;
            }

            p {
                margin: 0 0 18px;
                line-height: 1.5;
            }

            [role="tablist"] {
                display: flex;
                gap: 10px;
                margin-bottom: 16px;
            }

            [data-tab] {
                border: 1px solid #cad8f3;
                border-radius: 999px;
                padding: 0.75rem 1rem;
                font: inherit;
                font-weight: 700;
                background: #f7f9fe;
                color: #294474;
                cursor: pointer;
            }

            [data-tab].is-active {
                color: white;
                border-color: #224fae;
                background: linear-gradient(135deg, #346bdd, #1c3f86);
            }

            [data-panel] {
                padding: 16px;
                border-radius: 16px;
                border: 1px solid #d7e1f6;
                background: #f8faff;
            }
        </style>
    </head>
    <body>
        <main class="demo-shell">
            <h1>Element Safeguards Demo</h1>
            <p>This component expects a specific DOM structure and validates it through custom resolution plus explicit element counts.</p>
            <section data-tabs>
                <div>
                    <button type="button" data-tab>Tab 1</button>
                    <button type="button" data-tab>Tab 2</button>
                </div>
                <section data-panel>Tab 1 content</section>
                <section data-panel hidden>Tab 2 content</section>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/ornata/dist/index.global.js"></script>
        <script>
            const { defineComponent } = window.Ornata;

            const Tabs = defineComponent({
                name: "Tabs",
                state: {
                    activeIndex: { default: 0, type: Number },
                },
                elements: {
                    tablist: {
                        resolve(root) {
                            return (
                                Array.from(root.children).find((child) => {
                                    if (!(child instanceof HTMLDivElement)) return false;

                                    return Array.from(child.children).some((grandchild) => {
                                        return grandchild.hasAttribute("data-tab");
                                    });
                                }) ?? null
                            );
                        },
                        min: 1,
                        max: 1,
                    },
                    tabs: {
                        queryAll: ":scope > div > [data-tab]",
                        min: 2,
                    },
                    panels: {
                        queryAll: ":scope > [data-panel]",
                        min: 2,
                    },
                },
                render: {
                    tablist() {
                        return {
                            attributes: {
                                role: "tablist",
                            },
                        };
                    },
                    tabs({ index }) {
                        const currentIndex = index ?? 0;
                        const isActive = currentIndex === this.state.activeIndex;

                        return {
                            attributes: {
                                type: "button",
                                "aria-selected": String(isActive),
                            },
                            classes: {
                                "is-active": isActive,
                            },
                            events: {
                                click: () => {
                                    this.state.activeIndex = currentIndex;
                                },
                            },
                        };
                    },
                    panels({ index }) {
                        return {
                            attributes: {
                                hidden: (index ?? 0) !== this.state.activeIndex,
                            },
                        };
                    },
                },
            });

            Tabs.mount("[data-tabs]");
        </script>
    </body>
</html>
