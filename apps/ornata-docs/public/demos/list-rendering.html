<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ornata List Rendering Demo</title>
        <style>
            :root {
                color-scheme: light;
                font-family: "Avenir Next", "Segoe UI", sans-serif;
                background: #f2f5fb;
                color: #192335;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                background:
                    radial-gradient(circle at top, #fcfdff 0, #eef2fb 48%, #dde6f8 100%);
            }

            .demo-shell {
                width: min(100%, 560px);
                padding: 24px;
                border: 1px solid #cad7f1;
                border-radius: 22px;
                background: rgba(255, 255, 255, 0.96);
                box-shadow: 0 18px 40px rgba(35, 57, 104, 0.12);
            }

            h1 {
                margin: 0 0 8px;
                font-size: 1.25rem;
            }

            p {
                margin: 0 0 18px;
                line-height: 1.5;
            }

            ol {
                list-style: none;
                display: flex;
                gap: 12px;
                padding: 0;
                margin: 0 0 20px;
            }

            [data-step] {
                flex: 1;
                padding: 0.9rem 1rem;
                border-radius: 18px;
                border: 1px solid #d7e1f6;
                background: #f7f9ff;
                color: #4c5f82;
                font-weight: 700;
                text-align: center;
                transition:
                    background 140ms ease,
                    color 140ms ease,
                    border-color 140ms ease,
                    transform 140ms ease;
            }

            [data-step].is-complete {
                border-color: #9cc6a7;
                background: #ecf8ef;
                color: #23583a;
            }

            [data-step].is-active {
                color: white;
                border-color: #244eae;
                background: linear-gradient(135deg, #2f63d6, #1d3d83);
                transform: translateY(-1px);
            }

            .controls {
                display: flex;
                justify-content: space-between;
                gap: 12px;
            }

            .controls button {
                border: 1px solid #cad7f1;
                border-radius: 999px;
                padding: 0.75rem 1rem;
                font: inherit;
                font-weight: 700;
                background: #f7f9fe;
                color: #28416d;
                cursor: pointer;
            }

            .controls button[disabled] {
                cursor: not-allowed;
                opacity: 0.5;
            }
        </style>
    </head>
    <body>
        <main class="demo-shell">
            <h1>List Rendering Demo</h1>
            <p>Each step responds to shared state through list rendering with <code>index</code>.</p>

            <section data-stepper>
                <ol>
                    <li data-step>Step 1</li>
                    <li data-step>Step 2</li>
                    <li data-step>Step 3</li>
                </ol>

                <div class="controls">
                    <button type="button" data-prev>Previous</button>
                    <button type="button" data-next>Next</button>
                </div>
            </section>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/ornata/dist/index.global.js"></script>
        <script>
            const { defineComponent } = window.Ornata;

            const Stepper = defineComponent({
                name: "Stepper",
                state: {
                    activeIndex: { default: 0, type: Number },
                },
                elements: {
                    steps: { queryAll: "[data-step]", min: 2 },
                    prev: { query: "[data-prev]" },
                    next: { query: "[data-next]" },
                },
                methods: {
                    previous() {
                        this.state.activeIndex = Math.max(0, this.state.activeIndex - 1);
                    },
                    next() {
                        this.state.activeIndex = Math.min(
                            this.elements.steps.length - 1,
                            this.state.activeIndex + 1
                        );
                    },
                },
                render: {
                    steps({ index }) {
                        const currentIndex = index ?? 0;
                        const isActive = currentIndex === this.state.activeIndex;
                        const isComplete = currentIndex < this.state.activeIndex;

                        return {
                            attributes: {
                                "aria-current": isActive ? "step" : null,
                            },
                            classes: {
                                "is-active": isActive,
                                "is-complete": isComplete,
                            },
                        };
                    },
                    prev() {
                        return {
                            attributes: {
                                type: 'button',
                                disabled: this.state.activeIndex === 0,
                            },
                            events: {
                                click: () => this.methods.previous(),
                            },
                        };
                    },
                    next() {
                        return {
                            attributes: {
                                type: 'button',
                                disabled:
                                    this.state.activeIndex ===
                                    this.elements.steps.length - 1,
                            },
                            events: {
                                click: () => this.methods.next(),
                            },
                        };
                    },
                },
            });

            Stepper.mount("[data-stepper]");
        </script>
    </body>
</html>
